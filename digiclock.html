<!DOCTYPE html> 
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Time Mood Clock</title>

<style>
  @font-face{
    font-family: "DrukTextHeavy";
    src: url("fonts/DrukText-Heavy.otf") format("opentype");
    font-weight: 900;
    font-style: normal;
    font-display: swap;
  }

  :root{
    --bg0:#050818;
    --bg1:#0b1634;

    --bezelA: rgba(255,255,255,0.18);
    --bezelB: rgba(255,255,255,0.06);
    --screen0: rgba(0,0,0,0.92);
    --screen1: rgba(0,0,0,0.78);
    --screenStroke: rgba(255,255,255,0.10);

    --neo: rgba(135,255,190,0.95);
    --neoDim: rgba(135,255,190,0.40);
    --neoGlow1: rgba(120,255,190,0.35);
    --neoGlow2: rgba(120,255,190,0.22);
    --neoGlow3: rgba(120,255,190,0.12);

    /* ---- Responsive scale controls ---- */
    --baseW: 860; /* design width in px */
    --scale: 1;
  }

  html, body{ height:100%; }
  body{
    margin:0;
    overflow:hidden;
    font-family: DrukTextHeavy, ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, Arial, sans-serif;
    background: radial-gradient(circle at 50% 30%, var(--bg1), var(--bg0));
    transition: background 900ms ease;
  }

  body::after{
    content:"";
    position:fixed;
    inset:-40%;
    pointer-events:none;
    opacity: 0.10;
    background:
      repeating-linear-gradient(0deg, rgba(255,255,255,0.08) 0 1px, transparent 1px 2px),
      repeating-linear-gradient(90deg, rgba(255,255,255,0.06) 0 1px, transparent 1px 3px);
    transform: rotate(8deg);
    mix-blend-mode: soft-light;
  }

  .bokeh{
    position:fixed;
    inset:0;
    pointer-events:none;
    opacity:0.55;
    filter: blur(0.2px);
    z-index:1;
  }
  .bokeh::before{
    content:"";
    position:absolute;
    inset:-10%;
    background:
      radial-gradient(circle at 12% 22%, rgba(255,255,255,0.10), transparent 26%),
      radial-gradient(circle at 86% 18%, rgba(255,255,255,0.08), transparent 28%),
      radial-gradient(circle at 70% 75%, rgba(255,255,255,0.06), transparent 30%),
      radial-gradient(circle at 28% 82%, rgba(255,255,255,0.07), transparent 30%);
    animation: drift 18s ease-in-out infinite;
  }
  @keyframes drift{
    0%{ transform: translate3d(0,0,0) scale(1); }
    50%{ transform: translate3d(2%, -2%, 0) scale(1.02); }
    100%{ transform: translate3d(0,0,0) scale(1); }
  }

  #nightFx{
    position:fixed;
    inset:0;
    pointer-events:none;
    z-index:2;
    opacity:0;
    transition: opacity 900ms ease;
  }
  body[data-theme="night"] #nightFx{ opacity:1; }

  .star{
    position:absolute;
    left: calc(var(--x) * 1vw);
    top:  calc(var(--y) * 1vh);
    width: var(--s);
    height: var(--s);
    border-radius: 999px;
    background: rgba(255,255,255,0.9);
    opacity: var(--o);
    filter: drop-shadow(0 0 8px rgba(255,255,255,0.14));
    animation: twinkle var(--d) ease-in-out var(--del) infinite;
  }
  @keyframes twinkle{
    0%,100%{ transform: scale(1); opacity: var(--o); }
    50%{ transform: scale(1.6); opacity: calc(var(--o) + 0.28); }
  }

  .comet{
    position:absolute;
    left: calc(var(--sx) * 1vw);
    top:  calc(var(--sy) * 1vh);
    width: var(--len);
    height: var(--th);
    border-radius: 999px;
    transform: rotate(var(--ang));
    transform-origin: left center;
    background: linear-gradient(90deg,
      rgba(255,255,255,0.00),
      rgba(255,255,255,0.35),
      rgba(255,255,255,0.95)
    );
    filter:
      drop-shadow(0 0 10px rgba(255,255,255,0.18))
      drop-shadow(0 0 22px rgba(180,220,255,0.12));
    opacity: 0;
    animation: shoot var(--cd) ease-out forwards;
  }
  @keyframes shoot{
    0%{ opacity:0; transform: rotate(var(--ang)) translateX(0); }
    10%{ opacity:0.95; }
    100%{ opacity:0; transform: rotate(var(--ang)) translateX(var(--dist)); }
  }

  .wrap{
    height:100%;
    display:flex;
    align-items:center;
    justify-content:center;
    padding: clamp(10px, 2vw, 18px);
    box-sizing:border-box;
    position:relative;
    z-index:3;
  }

  /* ---------- SCALE LAYER (makes whole UI media scalable) ---------- */
  .scale-stage{
    width: min(90vw, calc(var(--baseW) * 1px));
    transform: scale(var(--scale));
    transform-origin: center;
    will-change: transform;
  }

  /* --------- SMALLER OVERALL CASE --------- */
  .clock-case{
    width: 100%;
    border-radius: clamp(20px, 2.6vw, 30px);
    padding: clamp(7px, 1vw, 9px);
    background: linear-gradient(180deg, var(--bezelA), var(--bezelB));
    box-shadow:
      0 40px 120px rgba(0,0,0,0.55),
      inset 0 1px 0 rgba(255,255,255,0.20);
    border: 1px solid rgba(255,255,255,0.10);
    position:relative;
  }

  .clock-screen{
    border-radius: clamp(16px, 2.2vw, 24px);
    background: linear-gradient(180deg, var(--screen0), var(--screen1));
    border: 1px solid var(--screenStroke);
    position:relative;
    overflow:hidden;
    padding: clamp(14px, 2.2vw, 22px);
    box-shadow:
      inset 0 1px 0 rgba(255,255,255,0.08),
      inset 0 -30px 90px rgba(0,0,0,0.55);
    min-height: clamp(190px, 24vw, 290px);
    display:flex;
    align-items:center;
    justify-content:center;
  }

  .clock-screen::before{
    content:"";
    position:absolute;
    inset:-40% -30%;
    background: linear-gradient(115deg, transparent 36%, rgba(255,255,255,0.10) 48%, transparent 62%);
    transform: translateX(-20%) rotate(6deg);
    opacity: 0.55;
    pointer-events:none;
  }
  .clock-screen::after{
    content:"";
    position:absolute;
    inset:0;
    background: radial-gradient(circle at 50% 50%, transparent 55%, rgba(0,0,0,0.55) 100%);
    opacity: 0.35;
    pointer-events:none;
  }

  .digits{
    position:relative;
    z-index:4;
    display:flex;
    align-items:center;
    justify-content:center;
    gap: clamp(12px, 2vw, 24px);
    width: 100%;
    max-width: 820px;
    padding-bottom: clamp(62px, 7vw, 78px);
  }

  .digit-input{
    box-sizing:border-box;
    width: clamp(150px, 24vw, 260px);
    height: clamp(100px, 14vw, 170px);
    border-radius: clamp(12px, 1.7vw, 16px);
    border: 1px solid rgba(255,255,255,0.12);
    background:
      radial-gradient(circle at 30% 20%, rgba(255,255,255,0.05), transparent 45%),
      linear-gradient(180deg, rgba(0,0,0,0.38), rgba(0,0,0,0.76));
    box-shadow:
      inset 0 1px 0 rgba(255,255,255,0.08),
      inset 0 -18px 40px rgba(0,0,0,0.35),
      0 18px 44px rgba(0,0,0,0.22);

    color: var(--neo);
    font-family: DrukTextHeavy, ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, Arial, sans-serif;
    font-weight: 900;
    font-size: clamp(56px, 7.8vw, 110px);
    line-height: 1;
    text-align:center;
    outline:none;
    caret-color: var(--neo);
    letter-spacing: 0.06em;
    padding: 0 0.20em;
    font-variant-numeric: tabular-nums;

    text-shadow:
      0 0 10px var(--neoGlow1),
      0 0 22px var(--neoGlow2),
      0 0 44px var(--neoGlow3);
  }

  .digit-input::placeholder{
    color: var(--neoDim);
    text-shadow:
      0 0 10px rgba(120,255,190,0.12),
      0 0 26px rgba(120,255,190,0.08);
  }

  .digit-input:focus{
    border-color: rgba(120,255,190,0.40);
    box-shadow:
      0 0 0 4px rgba(120,255,190,0.10),
      inset 0 1px 0 rgba(255,255,255,0.08),
      inset 0 -18px 40px rgba(0,0,0,0.35),
      0 18px 44px rgba(0,0,0,0.22);
  }

  .colon{
    font-family: DrukTextHeavy, ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, Arial, sans-serif;
    font-weight: 900;
    font-size: clamp(56px, 7.8vw, 110px);
    line-height: 1;
    opacity: 0.96;
    transform: translateY(-0.06em);
    color: var(--neo);
    text-shadow:
      0 0 12px var(--neoGlow1),
      0 0 26px var(--neoGlow2),
      0 0 52px var(--neoGlow3);
  }

  .ampm{
    display:flex;
    flex-direction:column;
    gap: clamp(8px, 1.2vw, 10px);
    margin-left: clamp(2px, 0.6vw, 5px);
    transform: translateY(0.06em);
  }

  .pill{
    width: clamp(80px, 9vw, 105px);
    border-radius: 14px;
    border: 1px solid rgba(255,255,255,0.12);
    background: linear-gradient(180deg, rgba(255,255,255,0.06), rgba(0,0,0,0.35));
    padding: clamp(8px, 1vw, 10px) clamp(10px, 1.2vw, 12px);
    cursor:pointer;
    transition: transform 160ms ease, background 200ms ease, border-color 200ms ease, filter 200ms ease;
    box-shadow: inset 0 1px 0 rgba(255,255,255,0.08);

    color: var(--neo);
    font-family: DrukTextHeavy, ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, Arial, sans-serif;
    font-weight: 900;
    letter-spacing: 0.14em;
    text-transform: uppercase;
    text-shadow:
      0 0 10px var(--neoGlow1),
      0 0 22px var(--neoGlow2),
      0 0 44px var(--neoGlow3);
  }

  .pill:active{ transform: scale(0.98); }
  .pill.active{
    border-color: rgba(120,255,190,0.42);
    background: linear-gradient(180deg, rgba(120,255,190,0.10), rgba(0,0,0,0.35));
    filter: drop-shadow(0 0 10px rgba(120,255,190,0.12));
  }

  .controls{
    position:absolute;
    left: 50%;
    bottom: clamp(10px, 1.7vw, 16px);
    transform: translateX(-50%);
    display:flex;
    justify-content:center;
    gap: clamp(10px, 1.6vw, 12px);
    flex-wrap: wrap;
    z-index:5;
    width: calc(100% - clamp(24px, 4.6vw, 44px));
    max-width: 820px;
    pointer-events:auto;
  }

  .btn{
    border: 1px solid rgba(255,255,255,0.14);
    background: rgba(255,255,255,0.05);
    padding: clamp(10px, 1.4vw, 12px) clamp(14px, 1.8vw, 16px);
    border-radius: 16px;
    cursor:pointer;
    transition: transform 160ms ease, background 200ms ease, border-color 200ms ease;
    font-weight: 900;
    letter-spacing: 0.06em;
    min-width: clamp(130px, 20vw, 220px);
    text-align:center;
    backdrop-filter: blur(6px);
    -webkit-backdrop-filter: blur(6px);

    color: var(--neo);
    font-family: DrukTextHeavy, ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, Arial, sans-serif;
    text-transform: none;
    text-shadow:
      0 0 10px var(--neoGlow1),
      0 0 22px var(--neoGlow2),
      0 0 44px var(--neoGlow3);
  }

  .btn:hover{
    background: rgba(255,255,255,0.08);
    border-color: rgba(120,255,190,0.28);
  }
  .btn:active{ transform: scale(0.98); }

  body[data-theme="night"]{
    background: radial-gradient(circle at 50% 25%, #0c1b46 0%, #050818 55%, #02030a 100%);
  }
  body[data-theme="dawn"]{
    background: radial-gradient(circle at 50% 30%, #ffb38a 0%, #7a4aa2 35%, #14224d 100%);
  }
  body[data-theme="day"]{
    background: radial-gradient(circle at 50% 25%, #a6e6ff 0%, #3b82f6 45%, #0a1a3a 100%);
  }
  body[data-theme="sunset"]{
    background: radial-gradient(circle at 50% 28%, #ffcf6a 0%, #ff5a7a 35%, #20124a 100%);
  }

  @media (prefers-reduced-motion: reduce){
    .bokeh::before{ animation:none; }
    #nightFx{ display:none; }
    body{ transition:none; }
  }

  /* Small screens: stack nicer */
  @media (max-width: 640px){
    .digits{
      flex-wrap: wrap;
      row-gap: clamp(10px, 2vw, 16px);
      padding-bottom: clamp(78px, 11vw, 102px);
    }
    .ampm{
      flex-direction: row;
      gap: 10px;
      margin-left: 0;
      transform: none;
    }
  }
</style>
</head>

<body data-theme="night">
  <div class="bokeh"></div>
  <div id="nightFx" aria-hidden="true"></div>

  <div class="wrap">
    <div class="scale-stage" id="scaleStage">
      <div class="clock-case">
        <div class="clock-screen" aria-label="Digital alarm clock face">
          <div class="digits" aria-label="Digital clock inputs">
            <input id="hh" class="digit-input" inputmode="numeric" maxlength="2" placeholder="HH" aria-label="Hours" />
            <div class="colon" aria-hidden="true">:</div>
            <input id="mm" class="digit-input" inputmode="numeric" maxlength="2" placeholder="MM" aria-label="Minutes" />
            <div class="ampm" aria-label="AM PM selector">
              <button class="pill active" id="amBtn" type="button">AM</button>
              <button class="pill" id="pmBtn" type="button">PM</button>
            </div>
          </div>

          <div class="controls" aria-label="Clock controls">
            <button class="btn" id="nowBtn" type="button">Use current time</button>
            <button class="btn" id="randomBtn" type="button">Random time</button>
            <button class="btn" id="clearBtn" type="button">Clear</button>
          </div>
        </div>
      </div>
    </div>
  </div>

<script>
(function(){
  const hh = document.getElementById('hh');
  const mm = document.getElementById('mm');
  const amBtn = document.getElementById('amBtn');
  const pmBtn = document.getElementById('pmBtn');
  const nowBtn = document.getElementById('nowBtn');
  const randomBtn = document.getElementById('randomBtn');
  const clearBtn = document.getElementById('clearBtn');
  const nightFx = document.getElementById('nightFx');

  // ---- responsive scaling (whole UI) ----
  const stage = document.getElementById('scaleStage');
  const BASE_W = 860; // match --baseW
  function setScale(){
    // available width inside wrap padding
    const vw = Math.min(window.innerWidth, document.documentElement.clientWidth);
    const scale = Math.max(0.78, Math.min(1, (vw * 0.90) / BASE_W));
    document.documentElement.style.setProperty('--scale', scale.toFixed(3));
  }
  setScale();
  window.addEventListener('resize', setScale, { passive:true });

  let isPM = false;

  function clampNum(n, min, max){ return Math.max(min, Math.min(max, n)); }
  function sanitize2(el){ el.value = el.value.replace(/[^\d]/g, '').slice(0,2); }

  function setAMPM(pm){
    isPM = pm;
    amBtn.classList.toggle('active', !pm);
    pmBtn.classList.toggle('active', pm);
    updateThemeFromInputs();
  }

  amBtn.addEventListener('click', () => setAMPM(false));
  pmBtn.addEventListener('click', () => setAMPM(true));

  hh.addEventListener('input', () => {
    sanitize2(hh);
    if (hh.value.length === 2) mm.focus();
    updateThemeFromInputs();
  });
  mm.addEventListener('input', () => {
    sanitize2(mm);
    updateThemeFromInputs();
  });

  function stepField(el, step, min, max){
    let v = parseInt(el.value || '0', 10);
    v = clampNum(v + step, min, max);
    el.value = String(v).padStart(2,'0');
    updateThemeFromInputs();
  }

  hh.addEventListener('keydown', (e) => {
    if(e.key === 'ArrowUp'){ e.preventDefault(); stepField(hh, 1, 1, 12); }
    if(e.key === 'ArrowDown'){ e.preventDefault(); stepField(hh,-1, 1, 12); }
  });
  mm.addEventListener('keydown', (e) => {
    if(e.key === 'ArrowUp'){ e.preventDefault(); stepField(mm, 1, 0, 59); }
    if(e.key === 'ArrowDown'){ e.preventDefault(); stepField(mm,-1, 0, 59); }
  });

  function parseTime(){
    const Hraw = parseInt(hh.value, 10);
    const Mraw = parseInt(mm.value, 10);
    if (Number.isNaN(Hraw) || Number.isNaN(Mraw)) return null;

    const H = clampNum(Hraw, 1, 12);
    const M = clampNum(Mraw, 0, 59);

    let hour24 = H % 12;
    if (isPM) hour24 += 12;
    return { H, M, hour24 };
  }

  function themeForHour(hour24){
    if (hour24 >= 5 && hour24 <= 7) return 'dawn';
    if (hour24 >= 8 && hour24 <= 16) return 'day';
    if (hour24 >= 17 && hour24 <= 19) return 'sunset';
    return 'night';
  }

  function updateThemeFromInputs(){
    const t = parseTime();
    if(!t){
      document.body.dataset.theme = 'night';
      return;
    }

    if (hh.value.length === 2) hh.value = String(t.H).padStart(2,'0');
    if (mm.value.length === 2) mm.value = String(t.M).padStart(2,'0');

    document.body.dataset.theme = themeForHour(t.hour24);
  }

  nowBtn.addEventListener('click', () => {
    const d = new Date();
    const hour24 = d.getHours();
    const minute = d.getMinutes();

    const pm = hour24 >= 12;
    setAMPM(pm);

    let h12 = hour24 % 12;
    if (h12 === 0) h12 = 12;

    hh.value = String(h12).padStart(2,'0');
    mm.value = String(minute).padStart(2,'0');
    updateThemeFromInputs();
  });

  randomBtn.addEventListener('click', () => {
    const hour24 = Math.floor(Math.random()*24);
    const minute = Math.floor(Math.random()*60);

    const pm = hour24 >= 12;
    setAMPM(pm);

    let h12 = hour24 % 12;
    if (h12 === 0) h12 = 12;

    hh.value = String(h12).padStart(2,'0');
    mm.value = String(minute).padStart(2,'0');
    updateThemeFromInputs();
  });

  clearBtn.addEventListener('click', () => {
    hh.value = '';
    mm.value = '';
    setAMPM(false);
    document.body.dataset.theme = 'night';
    hh.focus();
  });

  function rand(min, max){ return Math.random() * (max - min) + min; }
  function prefersReducedMotion(){
    return window.matchMedia && window.matchMedia('(prefers-reduced-motion: reduce)').matches;
  }

  function buildStars(){
    if (!nightFx || prefersReducedMotion()) return;
    nightFx.innerHTML = '';
    const count = 150;
    for (let i = 0; i < count; i++){
      const star = document.createElement('div');
      star.className = 'star';

      const size = rand(1, 2.8);
      const op = rand(0.16, 0.78);
      const dur = rand(1.4, 5.0);
      const del = rand(0, 4.2);

      star.style.setProperty('--x', rand(0, 100).toFixed(2));
      star.style.setProperty('--y', rand(0, 100).toFixed(2));
      star.style.setProperty('--s', `${size.toFixed(2)}px`);
      star.style.setProperty('--o', op.toFixed(2));
      star.style.setProperty('--d', `${dur.toFixed(2)}s`);
      star.style.setProperty('--del', `${del.toFixed(2)}s`);

      nightFx.appendChild(star);
    }
  }

  function spawnComet(){
    if (!nightFx || prefersReducedMotion()) return;
    if (document.body.dataset.theme !== 'night') return;

    const comet = document.createElement('div');
    comet.className = 'comet';

    const startX = rand(-15, 35);
    const startY = rand(0, 55);
    const angle = rand(-10, 18);
    const dist = rand(120, 180);
    const duration = rand(0.9, 1.5);
    const length = rand(140, 240);
    const thickness = rand(2, 4);

    comet.style.setProperty('--sx', startX.toFixed(2));
    comet.style.setProperty('--sy', startY.toFixed(2));
    comet.style.setProperty('--ang', `${angle.toFixed(2)}deg`);
    comet.style.setProperty('--dist', `${dist.toFixed(0)}vw`);
    comet.style.setProperty('--cd', `${duration.toFixed(2)}s`);
    comet.style.setProperty('--len', `${length.toFixed(0)}px`);
    comet.style.setProperty('--th', `${thickness.toFixed(0)}px`);

    nightFx.appendChild(comet);
    comet.addEventListener('animationend', () => comet.remove());
  }

  let cometTimer = null;
  function scheduleComets(){
    if (prefersReducedMotion()) return;
    if (cometTimer) clearTimeout(cometTimer);

    const loop = () => {
      const next = rand(3000, 9000);
      cometTimer = setTimeout(() => {
        if (document.body.dataset.theme === 'night' && Math.random() < 0.7) spawnComet();
        loop();
      }, next);
    };
    loop();
  }

  buildStars();
  scheduleComets();

  let resizeT = null;
  window.addEventListener('resize', () => {
    clearTimeout(resizeT);
    resizeT = setTimeout(buildStars, 180);
  });

  updateThemeFromInputs();
})();
</script>
</body>
</html>
