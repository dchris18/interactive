<!DOCTYPE html>
<html lang="en">
<head>
  <link rel="icon" type="image/png" href="hourglass.png">
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Broken Clock</title>

<link rel="preload" href="Fonts/DrukCond-Super.otf" as="font" type="font/otf" crossorigin>

<style>
  @font-face{
    font-family: "DrukCondSuper";
    src: url("Fonts/DrukCond-Super.otf") format("opentype");
    font-weight: 400;
    font-style: normal;
    font-display: block;
  }

  :root{
    --bgTop:#0e1526;
    --bgBot:#05070c;
    --ink: rgba(255,255,255,0.92);

    --goldHi:#ffe7a8;
    --gold1:#f6d57a;
    --gold2:#d6a63a;
    --gold3:#9b6f10;
    --goldDeep:#5a3a00;

    --leather1:#6b3f1d;
    --leather2:#4b2c13;
    --leather3:#2b190c;
  }

  html,body{height:100%;}
  body{
    margin:0;
    overflow:hidden;
    display:flex;
    align-items:center;
    justify-content:center;
    background:
      radial-gradient(circle at 50% 22%, rgba(255,255,255,0.06), transparent 60%),
      radial-gradient(circle at 30% 70%, rgba(255,255,255,0.03), transparent 60%),
      linear-gradient(180deg, var(--bgTop), var(--bgBot));
    color:var(--ink);
  }

  body::before{
    content:"";
    position:fixed;
    inset:-20%;
    pointer-events:none;
    background: radial-gradient(circle at 50% 50%, transparent 55%, rgba(0,0,0,0.62) 100%);
    opacity: 0.95;
  }

  body::after{
    content:"";
    position:fixed;
    inset:-40%;
    pointer-events:none;
    opacity:0.10;
    background:
      repeating-linear-gradient(0deg, rgba(255,255,255,0.10) 0 1px, transparent 1px 3px),
      repeating-linear-gradient(90deg, rgba(255,255,255,0.06) 0 1px, transparent 1px 4px);
    transform: rotate(7deg);
    mix-blend-mode: soft-light;
  }

  .layout{
    position:relative;
    width:min(980px, 92vw);
    height:100%;
    display:flex;
    flex-direction:column;
    align-items:center;
    justify-content:center;

    gap: clamp(14px, 3.2vh, 34px);
    padding-top: clamp(8px, 2.4vh, 18px);
    padding-bottom: clamp(14px, 4vh, 44px);
    box-sizing:border-box;
  }

  .quote{
    width:100%;
    text-align:center;

    font-family:"DrukCondSuper", system-ui, sans-serif;
    font-weight:400;
    text-transform:uppercase;

    font-size: clamp(44px, 5.6vw, 102px);
    line-height:0.98;
    letter-spacing:0.06em;

    color:#2a3550;
    text-shadow:
      0 8px 42px rgba(0,0,0,0.75),
      0 0 70px rgba(255,255,255,0.10);

    padding: 0 2vw;
    box-sizing:border-box;

    transform: translateY(clamp(-12px, -2vh, -22px));
  }

  .stage{
    position:relative;
    width: min(460px, 86vw);
    height: min(520px, 68vh);
    display:flex;
    align-items:center;
    justify-content:center;

    transform: translateY(clamp(10px, 1.6vh, 18px));
  }

  .band{
    position:absolute;
    top:50%;
    left:50%;
    width:170vw;
    height: clamp(90px, 14vh, 150px);
    transform: translate(-50%,-50%);
    z-index:1;
    pointer-events:none;
    filter: drop-shadow(0 18px 50px rgba(0,0,0,0.55));
  }

  .strap{
    position:absolute;
    inset:0;
    border-radius:26px;
    background:
      linear-gradient(180deg, rgba(0,0,0,0.34), transparent 18%, transparent 82%, rgba(0,0,0,0.42)),
      repeating-linear-gradient(92deg, rgba(255,255,255,0.08) 0 2px, rgba(0,0,0,0.22) 2px 10px, rgba(255,255,255,0.03) 10px 18px),
      repeating-linear-gradient(6deg, rgba(0,0,0,0.14) 0 2px, transparent 2px 14px),
      radial-gradient(circle at 12% 55%, rgba(0,0,0,0.32), transparent 46%),
      radial-gradient(circle at 48% 26%, rgba(255,255,255,0.07), transparent 52%),
      radial-gradient(circle at 83% 66%, rgba(0,0,0,0.34), transparent 52%),
      linear-gradient(180deg, var(--leather1), var(--leather2) 60%, var(--leather3));
    border:1px solid rgba(255,255,255,0.10);
    box-shadow:
      inset 0 12px 26px rgba(255,255,255,0.05),
      inset 0 -26px 40px rgba(0,0,0,0.46),
      0 26px 70px rgba(0,0,0,0.55);
    overflow:hidden;
  }

  .strap::before{
    content:"";
    position:absolute;
    inset:-18%;
    background:
      repeating-linear-gradient(18deg, rgba(0,0,0,0.18) 0 1px, transparent 1px 18px),
      repeating-linear-gradient(-22deg, rgba(255,255,255,0.07) 0 1px, transparent 1px 22px),
      linear-gradient(90deg, transparent 0%, transparent 46%, rgba(0,0,0,0.22) 49%, transparent 52%, transparent 100%),
      linear-gradient(90deg, transparent 0%, transparent 70%, rgba(255,255,255,0.08) 72%, transparent 74%, transparent 100%);
    opacity:0.78;
    filter: blur(0.28px);
    mix-blend-mode:multiply;
  }

  .strap::after{
    content:"";
    position:absolute;
    inset:0;
    background:
      radial-gradient(circle at 8% 10%, rgba(0,0,0,0.35) 0 14px, transparent 16px),
      radial-gradient(circle at 18% 92%, rgba(0,0,0,0.32) 0 16px, transparent 18px),
      radial-gradient(circle at 62% 6%, rgba(0,0,0,0.28) 0 12px, transparent 14px),
      radial-gradient(circle at 88% 96%, rgba(0,0,0,0.30) 0 14px, transparent 16px),
      repeating-linear-gradient(12deg, rgba(255,255,255,0.12) 0 1px, transparent 1px 16px);
    opacity:0.45;
    mix-blend-mode:multiply;
    mask: linear-gradient(180deg,#000 0%,#000 16%,transparent 40%,transparent 60%,#000 84%,#000 100%);
  }

  .slot{
    position:absolute;
    top:50%;
    width: clamp(120px, 22vw, 190px);
    height: clamp(22px, 4vh, 36px);
    transform: translateY(-50%);
    border-radius:999px;
    background: linear-gradient(180deg, rgba(255,255,255,0.08), rgba(0,0,0,0.24));
    box-shadow:
      inset 0 1px 0 rgba(255,255,255,0.10),
      inset 0 -14px 18px rgba(0,0,0,0.40);
    opacity:0.65;
    z-index:2;
  }
  .slot.left{ left: clamp(-40px, -8vw, -10px); }
  .slot.right{ right: clamp(-40px, -8vw, -10px); }

  .watch{
    width: min(320px, 64vw);
    aspect-ratio:1/1;
    position:relative;
    z-index:3;
    filter: drop-shadow(0 34px 90px rgba(0,0,0,0.75));
  }

  .case{
    position:absolute;
    inset:0;
    border-radius:999px;
    background:
      radial-gradient(circle at 30% 22%, rgba(255,255,255,0.18), transparent 42%),
      radial-gradient(circle at 70% 78%, rgba(0,0,0,0.42), transparent 52%),
      radial-gradient(circle at 16% 34%, rgba(0,0,0,0.38), transparent 40%),
      radial-gradient(circle at 86% 26%, rgba(0,0,0,0.34), transparent 42%),
      radial-gradient(circle at 76% 88%, rgba(0,0,0,0.32), transparent 46%),
      radial-gradient(circle at 26% 80%, rgba(0,0,0,0.26), transparent 46%),
      radial-gradient(circle at 22% 62%, rgba(60,40,0,0.35), transparent 44%),
      radial-gradient(circle at 74% 40%, rgba(20,50,40,0.18), transparent 46%),
      radial-gradient(circle at 62% 78%, rgba(30,20,0,0.26), transparent 48%),
      repeating-linear-gradient(90deg, rgba(255,255,255,0.05) 0 1px, rgba(0,0,0,0.06) 1px 5px),
      repeating-linear-gradient(0deg, rgba(255,255,255,0.03) 0 1px, transparent 1px 9px),
      conic-gradient(from 210deg,
        var(--goldHi) 0%,
        var(--gold1) 14%,
        var(--gold2) 32%,
        var(--gold3) 52%,
        var(--goldDeep) 70%,
        var(--gold1) 88%,
        var(--goldHi) 100%
      );
    border: 1px solid rgba(255,255,255,0.25);
    box-shadow:
      inset 0 1px 0 rgba(255,255,255,0.38),
      inset 0 -54px 88px rgba(0,0,0,0.46),
      0 24px 70px rgba(0,0,0,0.55);
  }

  .bezel{
    position:absolute;
    inset: 7%;
    border-radius:999px;
    background:
      radial-gradient(circle at 50% 55%, rgba(0,0,0,0.22), transparent 58%),
      linear-gradient(180deg, rgba(255,255,255,0.16), rgba(0,0,0,0.24));
    border: 1px solid rgba(255,255,255,0.14);
    box-shadow:
      inset 0 0 0 1px rgba(0,0,0,0.40),
      inset 0 18px 28px rgba(255,255,255,0.06),
      inset 0 -30px 52px rgba(0,0,0,0.34);
  }

  .face{
    position:absolute;
    inset:14%;
    border-radius:999px;
    background:
      radial-gradient(circle at 35% 28%, rgba(255,255,255,0.92), rgba(250,245,235,0.82) 56%, rgba(225,216,199,0.78) 100%),
      repeating-linear-gradient(90deg, rgba(0,0,0,0.025) 0 2px, transparent 2px 7px),
      radial-gradient(circle at 22% 70%, rgba(90,70,40,0.10), transparent 46%),
      radial-gradient(circle at 74% 38%, rgba(60,60,60,0.07), transparent 48%);
    box-shadow:
      inset 0 0 0 1px rgba(0,0,0,0.12),
      inset 0 -28px 48px rgba(0,0,0,0.12);
    overflow:hidden;
  }

  .ticks{
    position:absolute;
    inset:10%;
    border-radius:999px;
    pointer-events:none;
    background: repeating-conic-gradient(rgba(0,0,0,0.55) 0deg 1deg, transparent 1deg 6deg);
    mask: radial-gradient(circle, transparent 58%, #000 60%);
    opacity:0.80;
  }

  .hand{
    position:absolute;
    left:50%;
    top:50%;
    transform-origin:50% 90%;
    transform:translate(-50%,-90%) rotate(0deg);
    border-radius:999px;
    background: linear-gradient(180deg, rgba(40,35,30,0.95), rgba(10,8,7,0.95));
    box-shadow: 0 12px 30px rgba(0,0,0,0.22), inset 0 1px 0 rgba(255,255,255,0.10);
  }
  .hand.hour{   width: clamp(6px, 1.2vw, 9px);  height:28%; }
  .hand.minute{ width: clamp(4px, 0.9vw, 7px);  height:40%; }
  .hand.second{
    width: clamp(2px, 0.5vw, 3px);
    height:44%;
    background: linear-gradient(180deg, rgba(190,40,40,0.95), rgba(110,12,12,0.95));
  }

  .pivot{
    position:absolute;
    left:50%;
    top:50%;
    width: clamp(10px, 2.2vw, 16px);
    height: clamp(10px, 2.2vw, 16px);
    border-radius:999px;
    transform:translate(-50%,-50%);
    background:
      radial-gradient(circle at 30% 30%, rgba(255,255,255,0.42), rgba(0,0,0,0.22)),
      radial-gradient(circle at 70% 70%, rgba(0,0,0,0.30), transparent 55%);
    border:1px solid rgba(0,0,0,0.25);
  }

  .glass{
    position:absolute;
    inset:13.5%;
    border-radius:999px;
    pointer-events:none;
    overflow:hidden;
    background:
      radial-gradient(circle at 50% 50%, transparent 52%, rgba(0,0,0,0.18) 72%, rgba(0,0,0,0.40) 100%),
      radial-gradient(circle at 30% 22%, rgba(255,255,255,0.35), transparent 44%),
      radial-gradient(circle at 78% 66%, rgba(255,255,255,0.14), transparent 52%),
      linear-gradient(110deg, rgba(255,255,255,0.14), transparent 34%, rgba(255,255,255,0.05));
    opacity:0.62;
    mix-blend-mode:screen;
  }

  .glass::after{
    content:"";
    position:absolute;
    inset:0;
    border-radius:999px;
    background:url("glass.png") center/cover no-repeat;
    opacity:0.42;
    mix-blend-mode:overlay;
    filter: contrast(1.05) saturate(0.95);
  }

  .cracks{
    position:absolute;
    inset:14%;
    border-radius:999px;
    pointer-events:none;
    background:
      linear-gradient(112deg, transparent 0%, transparent 45.2%, rgba(255,255,255,0.80) 46.8%, rgba(255,255,255,0.18) 48.2%, transparent 50.2%, transparent 100%),
      linear-gradient(28deg,  transparent 0%, transparent 56.8%, rgba(255,255,255,0.64) 58.4%, rgba(255,255,255,0.16) 59.6%, transparent 61.6%, transparent 100%),
      linear-gradient(165deg, transparent 0%, transparent 38.2%, rgba(255,255,255,0.60) 40.0%, rgba(255,255,255,0.14) 41.2%, transparent 43.6%, transparent 100%),
      linear-gradient(214deg, transparent 0%, transparent 52.0%, rgba(255,255,255,0.58) 53.6%, rgba(255,255,255,0.12) 54.8%, transparent 57.0%, transparent 100%);
    opacity:0.62;
    filter: blur(0.08px);
    mix-blend-mode:screen;
  }

  .glare{
    position:absolute;
    inset:14%;
    border-radius:999px;
    pointer-events:none;
    background:
      radial-gradient(circle at 28% 18%, rgba(255,255,255,0.34), transparent 42%),
      linear-gradient(120deg, rgba(255,255,255,0.12), transparent 35%, rgba(255,255,255,0.06));
    opacity:0.48;
    mix-blend-mode:screen;
  }

  @media (max-height: 680px){
    .layout{
      gap: clamp(10px, 2.2vh, 22px);
      padding-top: clamp(6px, 1.8vh, 14px);
    }
    .stage{
      height: min(480px, 62vh);
    }
  }

  @media (max-width: 360px){
    .quote{ font-size: clamp(40px, 6.4vw, 92px); }
  }

  html.fonts-loading .quote{ opacity:0; }
  html.fonts-loaded .quote{
    opacity:1;
    transition: opacity 120ms ease;
  }
</style>
</head>

<body>
  <div class="layout">
    <div class="quote">A BROKEN CLOCK IS STILL RIGHT TWICE A DAY</div>

    <div class="stage">
      <div class="band" aria-hidden="true">
        <div class="strap"></div>
      </div>

      <div class="slot left" aria-hidden="true"></div>
      <div class="slot right" aria-hidden="true"></div>

      <div class="watch" aria-label="Cracked broken gold watch showing a random time">
        <div class="case"></div>
        <div class="bezel"></div>

        <div class="face">
          <div class="ticks"></div>
          <div class="hand hour" id="hourHand"></div>
          <div class="hand minute" id="minuteHand"></div>
          <div class="hand second" id="secondHand"></div>
          <div class="pivot"></div>
        </div>

        <div class="glass" aria-hidden="true"></div>
        <div class="cracks"></div>
        <div class="glare"></div>
      </div>
    </div>
  </div>

<script>
(function(){
  document.documentElement.classList.add('fonts-loading');

  if (document.fonts && document.fonts.load) {
    Promise.race([
      document.fonts.load('400 1em "DrukCondSuper"'),
      new Promise(res => setTimeout(res, 1800))
    ]).then(() => {
      document.documentElement.classList.remove('fonts-loading');
      document.documentElement.classList.add('fonts-loaded');
    });
  } else {
    document.documentElement.classList.remove('fonts-loading');
    document.documentElement.classList.add('fonts-loaded');
  }

  const H = Math.floor(Math.random() * 12) + 1;
  const M = Math.floor(Math.random() * 60);
  const S = Math.floor(Math.random() * 60);

  const sDeg = S * 6;
  const mDeg = (M + S/60) * 6;
  const hDeg = (H % 12 + M/60) * 30;

  document.getElementById('secondHand').style.transform = `translate(-50%,-90%) rotate(${sDeg}deg)`;
  document.getElementById('minuteHand').style.transform = `translate(-50%,-90%) rotate(${mDeg}deg)`;
  document.getElementById('hourHand').style.transform   = `translate(-50%,-90%) rotate(${hDeg}deg)`;
})();
</script>
</body>
</html>
