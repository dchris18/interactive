<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>TIME</title>

  <link rel="preload" href="Fonts/DrukText-Heavy.otf" as="font" type="font/otf" crossorigin>

  <style>
    @font-face{
      font-family:"DrukTextHeavy";
      src:url("Fonts/DrukText-Heavy.otf") format("opentype");
      font-display:swap;
    }

    :root{
      --ink:#4b3022;
      --ink-strong:#2e1c13;
    }

    *{box-sizing:border-box;}
    html,body{height:100%;margin:0;}

    body{
      display:grid;
      place-items:center;
      padding:clamp(18px,4vw,56px);
      overflow:hidden;
      font-family:"DrukTextHeavy", Georgia, serif;

      background:
        repeating-linear-gradient(0deg, rgba(90,70,40,0.05) 0 1px, transparent 1px 4px),
        repeating-linear-gradient(90deg, rgba(90,70,40,0.035) 0 1px, transparent 1px 5px),
        radial-gradient(circle at 22% 30%, rgba(40,25,10,0.10) 0 2px, transparent 3px),
        radial-gradient(circle at 65% 42%, rgba(40,25,10,0.08) 0 1.5px, transparent 2.8px),
        linear-gradient(180deg,#f2e6cb,#e4d1ab);
    }

    .content{
      text-align:center;
      width:min(1000px,94vw);
    }

    h1{
      margin:0 0 16px;
      color:var(--ink-strong);
      text-transform:uppercase;
      letter-spacing:0.06em;
      font-size:clamp(90px,13vw,160px);
      text-shadow:0 2px 3px rgba(0,0,0,0.18);
    }

    p{
      margin:0 auto;
      max-width:64ch;
      color:var(--ink);
      font-size:clamp(20px,3vw,34px);
      line-height:1.2;
      text-shadow:0 1.5px 2px rgba(0,0,0,0.15);
    }

    .rule{
      width:min(600px,78%);
      height:2px;
      margin:16px auto 24px;
      background:rgba(46,28,19,0.22);
      border-radius:999px;
    }

    /* 🔥 Translation button */
    .controls{
      margin-top:24px;
    }

    select{
      font-family:"DrukTextHeavy", serif;
      font-size:16px;
      padding:10px 16px;
      border:none;
      border-radius:8px;
      background:#2e1c13;
      color:#f2e6cb;
      cursor:pointer;
      box-shadow:0 4px 10px rgba(0,0,0,0.2);
    }

    select:hover{
      transform:translateY(-1px);
    }
  </style>
</head>

<body>
  <main class="content">
    <h1 id="title">TIME</h1>
    <div class="rule"></div>

    <p id="text">
      the indefinite continued progress of existence and events in the past, present, and future regarded as a whole.
    </p>

    <div class="controls">
      <select id="language">
        <option value="en">English</option>
        <option value="es">Spanish</option>
        <option value="fr">French</option>
        <option value="de">German</option>
        <option value="it">Italian</option>
        <option value="pt">Portuguese</option>
        <option value="ja">Japanese</option>
        <option value="zh">Chinese</option>
      </select>
    </div>
  </main>

<script>
  const translations = {
    en: {
      title: "TIME",
      text: "the indefinite continued progress of existence and events in the past, present, and future regarded as a whole."
    },
    es: {
      title: "TIEMPO",
      text: "el progreso continuo e indefinido de la existencia y los eventos en el pasado, presente y futuro considerados como un todo."
    },
    fr: {
      title: "TEMPS",
      text: "la progression continue et indéfinie de l'existence et des événements dans le passé, le présent et le futur considérés comme un tout."
    },
    de: {
      title: "ZEIT",
      text: "der unbestimmte fortlaufende Verlauf der Existenz und der Ereignisse in Vergangenheit, Gegenwart und Zukunft als Ganzes betrachtet."
    },
    it: {
      title: "TEMPO",
      text: "il progresso continuo e indefinito dell'esistenza e degli eventi nel passato, presente e futuro considerati nel loro insieme."
    },
    pt: {
      title: "TEMPO",
      text: "o progresso contínuo e indefinido da existência e dos eventos no passado, presente e futuro considerados como um todo."
    },
    ja: {
      title: "時間",
      text: "過去・現在・未来にわたる存在と出来事の継続的で無限の進行。"
    },
    zh: {
      title: "时间",
      text: "过去、现在和未来中存在与事件持续不断发展的整体过程。"
    }
  };

  const select = document.getElementById("language");
  const title = document.getElementById("title");
  const text = document.getElementById("text");

  select.addEventListener("change", () => {
    const lang = select.value;
    title.textContent = translations[lang].title;
    text.textContent = translations[lang].text;
  });
</script>
</body>
</html>
