<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Interactive Sundial</title>

<style>
@font-face{
  font-family: "DrukCondSuper";
  src: url("Fonts/DrukCond-Super.otf") format("opentype");
  font-weight: 400;
  font-style: normal;
  font-display: swap;
}

:root{
  --bg1:#0e1318;
  --bg2:#131a22;

  --stoneA:#0f141a;
  --stoneB:#1a232d;
  --stoneC:#263241;

  --ink: rgba(255,255,255,0.84);
  --shadow: rgba(0,0,0,0.58);

  --rimPad: 7%;
  --facePad: 12%;

  --handleSize: 22px;
  --capSize: 28px;

  --handleRadiusFactor: 0.885;
}

*{ box-sizing:border-box; }
html, body{ height:100%; }

body{
  margin:0;
  overflow:hidden;
  display:flex;
  align-items:center;
  justify-content:center;
  background:
    radial-gradient(circle at 40% 20%, rgba(255,255,255,0.08), transparent 55%),
    radial-gradient(circle at 70% 80%, rgba(0,0,0,0.55), transparent 55%),
    linear-gradient(180deg, var(--bg1), var(--bg2));
  font-family: "DrukCondSuper", ui-serif, Georgia, "Times New Roman", serif;
  color: var(--ink);
}

.bgLight{
  position:fixed;
  inset:-20%;
  pointer-events:none;
  opacity:0.95;
  filter: blur(0.2px);
  mix-blend-mode: screen;
  z-index: 0;
  background:
    radial-gradient(circle at 50% 50%,
      rgba(255,240,190,0.22) 0%,
      rgba(255,210,120,0.14) 18%,
      rgba(255,210,120,0.06) 34%,
      rgba(255,210,120,0.00) 55%);
  transform: translate3d(0,0,0);
}

.wrap{
  width: min(760px, 94vw);
  height: min(720px, 90vh);
  display:flex;
  align-items:center;
  justify-content:center;
  position:relative;
  z-index:1;
  padding-bottom: 110px;
}

.sundial{
  width: clamp(300px, 60vw, 460px);
  aspect-ratio: 1 / 1;
  position:relative;
  touch-action:none;
}

.plate{
  position:absolute;
  inset:0;
  border-radius:999px;
  background:
    radial-gradient(circle at 30% 28%, rgba(255,255,255,0.10), transparent 56%),
    radial-gradient(circle at 70% 78%, rgba(0,0,0,0.55), transparent 60%),
    linear-gradient(180deg, #0b0f14, #121a22 55%, #0a0e12);
  box-shadow:
    0 28px 90px rgba(0,0,0,0.55),
    inset 0 1px 0 rgba(255,255,255,0.10),
    inset 0 -26px 44px rgba(0,0,0,0.55);
  border: 1px solid rgba(255,255,255,0.10);
}

.rim{
  position:absolute;
  inset: var(--rimPad);
  border-radius:999px;
  background:
    radial-gradient(circle at 50% 50%, transparent 64%, rgba(0,0,0,0.25) 88%, rgba(0,0,0,0.45) 100%),
    radial-gradient(circle at 30% 25%, rgba(255,255,255,0.10), transparent 48%),
    linear-gradient(180deg, #101822, #1b2632 55%, #0f151e);
  box-shadow:
    inset 0 2px 0 rgba(255,255,255,0.08),
    inset 0 -18px 30px rgba(0,0,0,0.55);
  border: 1px solid rgba(255,255,255,0.10);
  overflow:hidden;
}

.rim::before{
  content:"";
  position:absolute;
  inset: 6%;
  border-radius:999px;
  border: 1px solid rgba(255,255,255,0.10);
  box-shadow: inset 0 0 0 1px rgba(0,0,0,0.55);
  opacity:0.9;
}

.rim::after{
  content:"";
  position:absolute;
  inset: 0;
  background:
    repeating-conic-gradient(
      from -90deg,
      rgba(255,255,255,0.10) 0deg 0.35deg,
      transparent 0.35deg 5deg
    );
  opacity:0.28;
  mix-blend-mode: overlay;
  pointer-events:none;
}

.face{
  position:absolute;
  inset: var(--facePad);
  border-radius:999px;
  background:
    radial-gradient(circle at 50% 45%, rgba(255,255,255,0.06), transparent 62%),
    radial-gradient(circle at 70% 78%, rgba(0,0,0,0.58), transparent 65%),
    linear-gradient(180deg, var(--stoneA), var(--stoneB) 55%, var(--stoneC));
  border: 1px solid rgba(255,255,255,0.10);
  box-shadow:
    inset 0 2px 0 rgba(255,255,255,0.08),
    inset 0 -22px 34px rgba(0,0,0,0.55);
  overflow:hidden;
}

.rays{
  position:absolute;
  inset:0;
  border-radius:999px;
  background:
    repeating-conic-gradient(
      from -90deg,
      rgba(255,255,255,0.11) 0deg 0.55deg,
      transparent 0.55deg 9deg
    );
  opacity:0.26;
  mix-blend-mode: overlay;
  pointer-events:none;
}

.hourlines{
  position:absolute;
  inset:0;
  border-radius:999px;
  pointer-events:none;
  opacity:0.95;
}

.hour-line{
  position:absolute;
  left:50%;
  top:50%;
  width: 48%;
  height: 2px;
  transform-origin: 0% 50%;
  background: rgba(255,255,255,0.10);
  box-shadow: 0 0 0 1px rgba(0,0,0,0.38);
}

.hour-line.major{
  height: 3px;
  background: rgba(255,255,255,0.14);
}

.romans{
  position:absolute;
  inset:0;
  pointer-events:none;
  color: rgba(255,255,255,0.78);
  text-shadow: 0 2px 0 rgba(0,0,0,0.55);
  font-family: "DrukCondSuper", ui-serif, Georgia, "Times New Roman", serif;
  font-weight: 400;
  letter-spacing:0.10em;
}

.romans span{
  position:absolute;
  transform: translate(-50%,-50%);
  font-size: clamp(10px, 2.0vw, 17px);
  opacity:0.92;
}

.compass{
  position:absolute;
  left:50%;
  top:50%;
  width: 16%;
  aspect-ratio:1/1;
  transform: translate(-50%,-50%);
  border-radius:999px;
  background:
    radial-gradient(circle at 30% 30%, rgba(255,255,255,0.10), transparent 55%),
    radial-gradient(circle at 70% 80%, rgba(0,0,0,0.60), transparent 55%),
    linear-gradient(180deg, rgba(255,255,255,0.08), rgba(0,0,0,0.28));
  border: 1px solid rgba(255,255,255,0.12);
  box-shadow:
    inset 0 2px 0 rgba(255,255,255,0.08),
    0 18px 50px rgba(0,0,0,0.45);
  pointer-events:none;
  overflow:hidden;
  opacity:0.95;
}

.compass::before{
  content:"";
  position:absolute;
  inset:12%;
  border-radius:999px;
  background:
    conic-gradient(
      from -90deg,
      rgba(255,255,255,0.10),
      rgba(0,0,0,0.18),
      rgba(255,255,255,0.10)
    );
  border: 1px solid rgba(255,255,255,0.10);
  box-shadow: inset 0 0 0 1px rgba(0,0,0,0.55);
  opacity:0.85;
}

.compass::after{
  content:"";
  position:absolute;
  left:50%;
  top:50%;
  width: 70%;
  height: 70%;
  transform: translate(-50%,-50%) rotate(45deg);
  clip-path: polygon(50% 0%, 62% 38%, 100% 50%, 62% 62%, 50% 100%, 38% 62%, 0% 50%, 38% 38%);
  background: rgba(255,255,255,0.10);
  box-shadow: 0 0 0 1px rgba(0,0,0,0.45) inset;
  opacity:0.65;
}

.gnomon{
  position:absolute;
  left:50%;
  top:50%;
  width: 56%;
  height: 56%;
  transform: translate(-50%,-70%) rotate(-10deg);
  transform-origin: 50% 82%;
  z-index: 5;
  filter: drop-shadow(0 18px 28px rgba(0,0,0,0.45));
  pointer-events:none;
}

.gnomon::before{
  content:"";
  position:absolute;
  inset:0;
  clip-path: polygon(52% 0%, 44% 100%, 64% 100%);
  background:
    linear-gradient(90deg, rgba(255,255,255,0.18), rgba(0,0,0,0.12)),
    linear-gradient(180deg, rgba(255,255,255,0.08), rgba(0,0,0,0.24));
  border: 1px solid rgba(255,255,255,0.14);
  box-shadow:
    inset 0 2px 0 rgba(255,255,255,0.10),
    inset 0 -18px 26px rgba(0,0,0,0.35);
  border-radius: 12px;
}

.cap{
  position:absolute;
  left:50%;
  top:50%;
  width: var(--capSize);
  height: var(--capSize);
  transform: translate(-50%,-50%);
  border-radius:999px;
  background:
    radial-gradient(circle at 30% 30%, rgba(255,255,255,0.16), rgba(0,0,0,0.35));
  border: 1px solid rgba(255,255,255,0.12);
  box-shadow: 0 18px 50px rgba(0,0,0,0.50);
  z-index: 6;
  pointer-events:none;
}

.shadow{
  position:absolute;
  left:50%;
  top:50%;
  width: 88%;
  height: 88%;
  transform: translate(-50%,-62%) rotate(0deg);
  transform-origin: 50% 80%;
  z-index: 3;
  pointer-events:none;
  opacity: 0.9;
}

.shadow::before{
  content:"";
  position:absolute;
  inset:0;
  clip-path: polygon(50% 0%, 47% 100%, 53% 100%);
  background: linear-gradient(180deg, var(--shadow), rgba(0,0,0,0.00));
  filter: blur(0.8px);
}

.sunHandle{
  position:absolute;
  left:50%;
  top: var(--rimPad);
  width: var(--handleSize);
  height: var(--handleSize);
  transform: translate(-50%, -50%);
  border-radius:999px;
  z-index: 10;
  cursor: grab;
  background:
    radial-gradient(circle at 30% 30%, rgba(255,255,255,0.65), rgba(255,255,255,0.10)),
    radial-gradient(circle at 60% 70%, rgba(255,220,120,0.60), rgba(255,220,120,0.00));
  border: 1px solid rgba(255,255,255,0.22);
  box-shadow:
    0 16px 36px rgba(0,0,0,0.55),
    inset 0 2px 0 rgba(255,255,255,0.18);
  touch-action:none;
}

.sunHandle:active{ cursor: grabbing; }

.sunBeam{
  position:absolute;
  left:50%;
  top:50%;
  width: 58%;
  height: 58%;
  transform: translate(-50%,-62%) rotate(0deg);
  transform-origin: 50% 80%;
  z-index: 2;
  pointer-events:none;
  opacity:0.45;
  mix-blend-mode: screen;
}

.sunBeam::before{
  content:"";
  position:absolute;
  inset:0;
  clip-path: polygon(50% 0%, 48.5% 100%, 51.5% 100%);
  background: linear-gradient(180deg, rgba(255,240,190,0.22), rgba(255,240,190,0.00));
  filter: blur(0.8px);
}

.readout{
  position:fixed;
  left:50%;
  bottom: 12px;
  transform: translateX(-50%);
  padding:12px 16px;
  border-radius:999px;
  background: rgba(255,255,255,0.06);
  border: 1px solid rgba(255,255,255,0.10);
  box-shadow: 0 22px 70px rgba(0,0,0,0.55);
  backdrop-filter: blur(10px);
  -webkit-backdrop-filter: blur(10px);
  font-family: "DrukCondSuper", ui-serif, Georgia, "Times New Roman", serif;
  font-weight: 400;
  letter-spacing:0.18em;
  text-transform:uppercase;
  font-size: clamp(22px, 5.2vw, 40px);
  line-height: 1;
  color: #cfd8e3;
  user-select:none;
  white-space:nowrap;
  z-index: 20;
}

@media (max-width: 600px){
  :root{
    --rimPad: 6.5%;
    --facePad: 10.5%;
    --handleSize: 20px;
    --capSize: 26px;
    --handleRadiusFactor: 0.895;
  }
  .wrap{
    width: 96vw;
    height: 88vh;
    padding-bottom: 105px;
  }
  .sundial{
    width: min(86vw, 430px);
  }
  .readout{
    font-size: clamp(22px, 7.2vw, 38px);
    letter-spacing: 0.16em;
  }
}

@media (max-width: 420px){
  :root{
    --rimPad: 6%;
    --facePad: 10%;
    --handleSize: 18px;
    --capSize: 24px;
    --handleRadiusFactor: 0.905;
  }
  .wrap{
    padding-bottom: 98px;
  }
  .sundial{
    width: 84vw;
  }
  .readout{
    font-size: clamp(22px, 8.4vw, 36px);
    letter-spacing: 0.14em;
  }
}

@media (prefers-reduced-motion: reduce){
  .shadow::before{ filter:none; }
  .sunBeam::before{ filter:none; }
}
</style>
</head>

<body>
  <div class="bgLight" id="bgLight" aria-hidden="true"></div>

  <div class="wrap">
    <div class="sundial" id="dial" aria-label="Interactive sundial (drag the sun to change the light direction)">
      <div class="plate"></div>
      <div class="rim">
        <div class="face" id="face">
          <div class="rays"></div>
          <div class="hourlines" id="hourlines"></div>

          <div class="sunBeam" id="sunBeam"></div>
          <div class="shadow" id="shadow"></div>

          <div class="gnomon"></div>
          <div class="cap"></div>
          <div class="compass"></div>

          <div class="romans" id="romans" aria-hidden="true"></div>
        </div>
      </div>

      <div class="sunHandle" id="sunHandle" title="Drag to change the light"></div>
    </div>
  </div>

  <div class="readout" id="readout">—</div>

<script>
(() => {
  const dial = document.getElementById('dial');
  const face = document.getElementById('face');
  const shadow = document.getElementById('shadow');
  const sunHandle = document.getElementById('sunHandle');
  const sunBeam = document.getElementById('sunBeam');
  const romans = document.getElementById('romans');
  const hourlines = document.getElementById('hourlines');
  const readout = document.getElementById('readout');
  const bgLight = document.getElementById('bgLight');

  const ROMAN = ["XII","I","II","III","IV","V","VI","VII","VIII","IX","X","XI"];

  let draggingSun = false;
  let lightDeg = 0;

  function clamp(v, a, b){ return Math.max(a, Math.min(b, v)); }

  function rectCenter(el){
    const r = el.getBoundingClientRect();
    return { cx: r.left + r.width/2, cy: r.top + r.height/2, r };
  }

  function pointerAngleDeg(e, center){
    const p = e.touches ? e.touches[0] : e;
    const x = p.clientX - center.cx;
    const y = p.clientY - center.cy;
    return (Math.atan2(y, x) * 180/Math.PI) + 90;
  }

  function normalize180(deg){
    return ((deg + 180) % 360) - 180;
  }

  function degToTimeFullCircle(deg){
    const d = normalize180(deg);
    let hours24 = (d + 180) / 15;
    hours24 = (hours24 % 24 + 24) % 24;

    let hh = Math.floor(hours24);
    let mm = Math.round((hours24 - hh) * 60);

    if(mm === 60){ mm = 0; hh = (hh + 1) % 24; }

    const ampm = hh >= 12 ? "PM" : "AM";
    const h12 = ((hh + 11) % 12) + 1;
    const mm2 = String(mm).padStart(2, "0");
    return `${h12}:${mm2} ${ampm}`;
  }

  function getHandleRadiusFactor(){
    const v = getComputedStyle(document.documentElement).getPropertyValue('--handleRadiusFactor').trim();
    const n = parseFloat(v);
    return Number.isFinite(n) ? n : 0.885;
  }

  function positionSunHandle(deg){
    const { cx, cy, r } = rectCenter(dial);

    const radius = (Math.min(r.width, r.height) / 2) * getHandleRadiusFactor();

    const rad = (deg - 90) * (Math.PI / 180);
    const x = cx + radius * Math.cos(rad);
    const y = cy + radius * Math.sin(rad);

    const localX = x - r.left;
    const localY = y - r.top;

    sunHandle.style.left = `${localX}px`;
    sunHandle.style.top  = `${localY}px`;
  }

  function updateBgLightFromSun(){
    const dr = dial.getBoundingClientRect();
    const sx = dr.left + parseFloat(sunHandle.style.left || (dr.width/2));
    const sy = dr.top  + parseFloat(sunHandle.style.top  || (dr.height/2));

    const vw = window.innerWidth;
    const vh = window.innerHeight;
    const px = clamp((sx / vw) * 100, 0, 100);
    const py = clamp((sy / vh) * 100, 0, 100);

    const norm = Math.abs(normalize180(lightDeg)) / 180;
    const strength = 1 - norm;

    const a1 = 0.18 + 0.12 * strength;
    const a2 = 0.10 + 0.08 * strength;
    const a3 = 0.05 + 0.05 * strength;

    bgLight.style.background =
      `radial-gradient(circle at ${px}% ${py}%,
        rgba(255,245,205,${a1}) 0%,
        rgba(255,220,140,${a2}) 18%,
        rgba(255,210,120,${a3}) 36%,
        rgba(255,210,120,0.00) 58%)`;
  }

  function setLight(deg){
    lightDeg = normalize180(deg);

    const shadowDeg = lightDeg + 180;
    shadow.style.transform = `translate(-50%,-62%) rotate(${shadowDeg}deg)`;
    sunBeam.style.transform = `translate(-50%,-62%) rotate(${lightDeg}deg)`;

    const centerFactor = 1 - Math.min(1, Math.abs(normalize180(lightDeg)) / 180);
    shadow.style.opacity = (0.52 + 0.40 * centerFactor).toFixed(3);

    positionSunHandle(lightDeg);
    updateBgLightFromSun();

    readout.textContent = degToTimeFullCircle(lightDeg);
  }

  function buildHourLines(){
    hourlines.innerHTML = "";
    for(let h=0; h<24; h++){
      const deg = (h * 15) - 180;
      const div = document.createElement('div');
      div.className = 'hour-line' + ((h % 3 === 0) ? ' major' : '');
      div.style.transform = `rotate(${deg}deg)`;
      hourlines.appendChild(div);
    }
  }

  function buildRomans(){
    romans.innerHTML = "";
    const { r } = rectCenter(face);
    const size = Math.min(r.width, r.height);
    const radius = (size / 2) * 0.93;

    for(let i=0; i<12; i++){
      const deg = i * 30;
      const rad = (deg - 90) * (Math.PI / 180);
      const x = (size/2) + radius * Math.cos(rad);
      const y = (size/2) + radius * Math.sin(rad);

      const s = document.createElement('span');
      s.textContent = ROMAN[i];
      s.style.left = `${(x / size) * 100}%`;
      s.style.top  = `${(y / size) * 100}%`;
      romans.appendChild(s);
    }
  }

  function updateFromPointer(e){
    const center = rectCenter(dial);
    let a = pointerAngleDeg(e, center);
    a = normalize180(a);
    setLight(a);
  }

  function onDown(e){
    draggingSun = true;
    updateFromPointer(e);
    e.preventDefault();
  }
  function onMove(e){
    if(!draggingSun) return;
    updateFromPointer(e);
    e.preventDefault();
  }
  function onUp(){
    draggingSun = false;
  }

  sunHandle.addEventListener("mousedown", onDown);
  window.addEventListener("mousemove", onMove);
  window.addEventListener("mouseup", onUp);

  sunHandle.addEventListener("touchstart", onDown, {passive:false});
  window.addEventListener("touchmove", onMove, {passive:false});
  window.addEventListener("touchend", onUp);

  dial.addEventListener("mousedown", onDown);
  dial.addEventListener("touchstart", onDown, {passive:false});

  window.addEventListener("resize", () => {
    buildRomans();
    setLight(lightDeg);
  });

  buildHourLines();
  buildRomans();
  setLight(0);
})();
</script>
</body>
</html>
