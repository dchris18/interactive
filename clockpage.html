<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Choose a Clock</title>

<!-- Preload fixes flash -->
<link rel="preload" href="Fonts/DrukCond-Super.otf" as="font" type="font/otf" crossorigin>

<style>
  @font-face {
    font-family: "DrukCondSuper";
    src: url("Fonts/DrukCond-Super.otf") format("opentype");
    font-weight: 400;
    font-style: normal;
    font-display: block;
  }

  body {
    margin: 0;
    width: 100vw;
    height: 100vh;
    background-color: #fff8e7;
    overflow: hidden;
  }

  .centerText {
    position: fixed;
    left: 50%;
    top: 50%;
    transform: translate(-50%, -50%);
    font-family: "DrukCondSuper", Arial, sans-serif;
    font-size: clamp(60px, 8vw, 130px);
    color: #FFEBCD;
    text-align: center;
    letter-spacing: 2px;
    white-space: nowrap;
    z-index: 0;
    pointer-events: none;
    user-select: none;
  }

  a.clockLink {
    position: absolute;
    display: block;
    z-index: 5;
  }

  .clock {
    width: 150px; /* ⬅️ smaller */
    height: auto;
    cursor: pointer;
    transition: transform 0.3s;
    user-select: none;
    -webkit-user-drag: none;
    will-change: transform;
  }

  a.clockLink:hover {
    z-index: 10;
  }

  a.clockLink:hover .clock {
    transform: scale(1.15);
  }
</style>
</head>

<body>
<div class="centerText">Time can take many forms</div>

<a href="clock1.html" class="clockLink">
  <img src="clock1.png" class="clock" />
</a>

<a href="clock2.html" class="clockLink">
  <img src="clock6.png" class="clock" />
</a>

<a href="clock3.html" class="clockLink">
  <img src="clock3.png" class="clock" />
</a>

<a href="watch4.html" class="clockLink">
  <img src="Watch.png" class="clock" />
</a>

<a href="clock5.html" class="clockLink">
  <img src="clock5.png" class="clock" />
</a>

<script>
const links = Array.from(document.querySelectorAll(".clockLink"));

const SIZE = 150; // ⬅️ matches new image size
const SPEED = 0.9;

const screenW = () => window.innerWidth;
const screenH = () => window.innerHeight;

const objs = links.map((el) => {
  const x = Math.random() * (screenW() - SIZE);
  const y = Math.random() * (screenH() - SIZE);

  el.style.left = x + "px";
  el.style.top = y + "px";

  return {
    el,
    x,
    y,
    vx: (Math.random() - 0.5) * SPEED * 2,
    vy: (Math.random() - 0.5) * SPEED * 2,
  };
});

function clampToScreen(o) {
  o.x = Math.max(0, Math.min(o.x, screenW() - SIZE));
  o.y = Math.max(0, Math.min(o.y, screenH() - SIZE));
}

function animate() {
  for (const o of objs) {
    o.x += o.vx;
    o.y += o.vy;

    if (o.x <= 0 || o.x + SIZE >= screenW()) o.vx *= -1;
    if (o.y <= 0 || o.y + SIZE >= screenH()) o.vy *= -1;
  }

  for (let i = 0; i < objs.length; i++) {
    for (let j = i + 1; j < objs.length; j++) {
      const a = objs[i];
      const b = objs[j];

      const dx = (a.x + SIZE/2) - (b.x + SIZE/2);
      const dy = (a.y + SIZE/2) - (b.y + SIZE/2);

      const dist = Math.sqrt(dx*dx + dy*dy) || 0.0001;

      if (dist < SIZE) {
        const overlap = SIZE - dist;
        const nx = dx / dist;
        const ny = dy / dist;

        a.x += nx * overlap/2;
        a.y += ny * overlap/2;
        b.x -= nx * overlap/2;
        b.y -= ny * overlap/2;

        const tvx = a.vx, tvy = a.vy;
        a.vx = b.vx;
        a.vy = b.vy;
        b.vx = tvx;
        b.vy = tvy;
      }
    }
  }

  for (const o of objs) {
    o.el.style.left = o.x + "px";
    o.el.style.top = o.y + "px";
  }

  requestAnimationFrame(animate);
}

animate();

window.addEventListener("resize", () => {
  for (const o of objs) clampToScreen(o);
});
</script>
</body>
</html>
