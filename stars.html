<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Constellation Message</title>

<style>
  @font-face{
    font-family: 'DrukTextHeavy';
    src:
      url('Fonts/DrukText-Heavy.otf') format('opentype'),
      url('Fonts/DrukText-Heavy.ttf') format('truetype');
    font-weight: 800;
    font-style: normal;
    font-display: swap;
  }

  html, body { height: 100%; }
  body{
    margin:0;
    overflow:hidden;
    background: #040611;
    font-family: 'DrukTextHeavy', system-ui, -apple-system, Segoe UI, Roboto, Arial, sans-serif;
  }

  .sky{
    position:fixed;
    inset:0;
    background:
      radial-gradient(circle at 50% 20%, rgba(90,120,255,0.12), transparent 55%),
      radial-gradient(circle at 20% 70%, rgba(160,120,255,0.10), transparent 55%),
      radial-gradient(circle at 80% 75%, rgba(120,170,255,0.10), transparent 60%),
      linear-gradient(180deg, #040611 0%, #02030a 60%, #010109 100%);
  }

  .haze{
    position:fixed;
    inset:-20%;
    background:
      radial-gradient(circle at 30% 30%, rgba(140,170,255,0.10), transparent 50%),
      radial-gradient(circle at 70% 60%, rgba(200,160,255,0.08), transparent 52%),
      radial-gradient(circle at 55% 80%, rgba(120,210,255,0.07), transparent 55%);
    filter: blur(26px);
    opacity: 0.75;
    animation: hazeDrift 70s ease-in-out infinite;
    pointer-events:none;
    mix-blend-mode: screen;
  }

  @keyframes hazeDrift{
    0%   { transform: translate3d(0,0,0) scale(1.02); opacity: 0.70; }
    50%  { transform: translate3d(-2.2%, 1.6%, 0) scale(1.05); opacity: 0.82; }
    100% { transform: translate3d(0,0,0) scale(1.02); opacity: 0.70; }
  }

  canvas{
    position:fixed;
    inset:0;
    width:100%;
    height:100%;
    display:block;
  }

  .vignette{
    position:fixed;
    inset:-20%;
    pointer-events:none;
    background: radial-gradient(circle at 50% 50%, transparent 55%, rgba(0,0,0,0.55) 100%);
    opacity: 0.85;
  }
  .grain{
    position:fixed;
    inset:-40%;
    pointer-events:none;
    opacity:0.08;
    background:
      repeating-linear-gradient(0deg, rgba(255,255,255,0.10) 0 1px, transparent 1px 3px),
      repeating-linear-gradient(90deg, rgba(255,255,255,0.06) 0 1px, transparent 1px 4px);
    transform: rotate(7deg);
    mix-blend-mode: soft-light;
  }
</style>
</head>

<body>
  <div class="sky"></div>
  <div class="haze"></div>
  <canvas id="c"></canvas>
  <div class="vignette"></div>
  <div class="grain"></div>

<script>
(() => {
  const canvas = document.getElementById("c");
  const ctx = canvas.getContext("2d");

  let W = 0, H = 0, DPR = 1;

  function resize(){
    DPR = Math.max(1, Math.min(2, window.devicePixelRatio || 1));
    W = Math.floor(innerWidth);
    H = Math.floor(innerHeight);
    canvas.width = Math.floor(W * DPR);
    canvas.height = Math.floor(H * DPR);
    canvas.style.width = W + "px";
    canvas.style.height = H + "px";
    ctx.setTransform(DPR,0,0,DPR,0,0);
  }
  addEventListener("resize", resize);
  resize();

  // Mouse
  const mouse = { x: W/2, y: H/2, vx: 0, vy: 0, active: false };
  let lastMouse = { x: W/2, y: H/2 };

  addEventListener("mousemove", (e) => {
    mouse.active = true;
    mouse.x = e.clientX;
    mouse.y = e.clientY;
    mouse.vx = mouse.x - lastMouse.x;
    mouse.vy = mouse.y - lastMouse.y;
    lastMouse = { x: mouse.x, y: mouse.y };
  }, { passive:true });

  addEventListener("mouseleave", () => {
    mouse.active = false;
    mouse.vx = 0; mouse.vy = 0;
  });

  function rand(a,b){ return a + Math.random()*(b-a); }
  function clamp(v,a,b){ return Math.max(a, Math.min(b, v)); }
  function smoothstep(a,b,x){
    const t = clamp((x-a)/(b-a), 0, 1);
    return t*t*(3-2*t);
  }
  function lerp(a,b,t){ return a + (b-a)*t; }

  // -------------------------
  // Background star field
  // -------------------------
  const bgStars = [];
  function buildBgStars(){
    bgStars.length = 0;
    const count = Math.floor((W * H) / 5200);
    for(let i=0;i<count;i++){
      bgStars.push({
        x: Math.random()*W,
        y: Math.random()*H,
        r: rand(0.6, 1.9),
        a: rand(0.12, 0.85),
        tw: rand(0.8, 2.2),
        ph: rand(0, Math.PI*2),
        drift: rand(0.004, 0.02),
      });
    }
  }
  buildBgStars();

  // -------------------------
  // Constellation message
  // -------------------------
  const message = "At the end of the day time moves on";

  // 5x7 bitmap font
  const FONT = {
    "A":["01110","10001","10001","11111","10001","10001","10001"],
    "B":["11110","10001","10001","11110","10001","10001","11110"],
    "C":["01111","10000","10000","10000","10000","10000","01111"],
    "D":["11110","10001","10001","10001","10001","10001","11110"],
    "E":["11111","10000","10000","11110","10000","10000","11111"],
    "F":["11111","10000","10000","11110","10000","10000","10000"],
    "G":["01111","10000","10000","10111","10001","10001","01111"],
    "H":["10001","10001","10001","11111","10001","10001","10001"],
    "I":["11111","00100","00100","00100","00100","00100","11111"],
    "J":["11111","00010","00010","00010","00010","10010","01100"],
    "K":["10001","10010","10100","11000","10100","10010","10001"],
    "L":["10000","10000","10000","10000","10000","10000","11111"],
    "M":["10001","11011","10101","10101","10001","10001","10001"],
    "N":["10001","11001","10101","10011","10001","10001","10001"],
    "O":["01110","10001","10001","10001","10001","10001","01110"],
    "P":["11110","10001","10001","11110","10000","10000","10000"],
    "Q":["01110","10001","10001","10001","10101","10010","01101"],
    "R":["11110","10001","10001","11110","10100","10010","10001"],
    "S":["01111","10000","10000","01110","00001","00001","11110"],
    "T":["11111","00100","00100","00100","00100","00100","00100"],
    "U":["10001","10001","10001","10001","10001","10001","01110"],
    "V":["10001","10001","10001","10001","10001","01010","00100"],
    "W":["10001","10001","10001","10101","10101","11011","10001"],
    "X":["10001","10001","01010","00100","01010","10001","10001"],
    "Y":["10001","10001","01010","00100","00100","00100","00100"],
    "Z":["11111","00001","00010","00100","01000","10000","11111"],
    " ":[
      "00000","00000","00000","00000","00000","00000","00000"
    ],
    ".":[
      "00000","00000","00000","00000","00000","00110","00110"
    ]
  };

  // Smaller + responsive "text" sizing:
  // Use a scale derived from viewport width, clamped so it stays legible on phones
  // and doesn't get huge on desktops.
  function responsiveScale(){
    // tweak these to taste:
    const s = W / 155;                 // <- smaller than your old W/85
    return clamp(s, 4.2, 9.0);         // min/max (in px per bitmap cell)
  }
  function responsiveSpacing(scale){
    // keep spacing proportional so letters don't get chunky at small sizes
    return clamp(Math.round(scale * 0.22), 1, 3);
  }
  function responsiveLineGap(scale){
    return clamp(Math.round(scale * 0.55), 2, 7);
  }

  function toDotPoints(text, opts){
    const t = text.toUpperCase();
    const scale = opts.scale;
    const spacing = opts.spacing;
    const lineGap = opts.lineGap;
    const maxWidth = opts.maxWidth;

    const words = t.split(" ");
    const lines = [];
    let line = "";
    function lineWidth(s){ return s.length ? s.length * (5 + spacing) : 0; }

    for(const w of words){
      const test = line ? (line + " " + w) : w;
      if(line && lineWidth(test) > maxWidth){
        lines.push(line);
        line = w;
      } else {
        line = test;
      }
    }
    if(line) lines.push(line);

    const points = [];
    let yCursor = 0;
    for(const ln of lines){
      let xCursor = 0;
      for(const ch of ln){
        const pat = FONT[ch] || FONT[" "];
        for(let r=0;r<7;r++){
          for(let c=0;c<5;c++){
            if(pat[r][c] === "1"){
              points.push({ gx: xCursor + c, gy: yCursor + r });
            }
          }
        }
        xCursor += (5 + spacing);
      }
      yCursor += (7 + lineGap);
    }

    let minX=Infinity, minY=Infinity, maxX=-Infinity, maxY=-Infinity;
    for(const p of points){
      minX = Math.min(minX, p.gx);
      minY = Math.min(minY, p.gy);
      maxX = Math.max(maxX, p.gx);
      maxY = Math.max(maxY, p.gy);
    }
    const gw = (maxX - minX + 1);
    const gh = (maxY - minY + 1);

    const pxW = gw * scale;
    const pxH = gh * scale;

    // Slightly higher on the screen like before, but a bit less aggressive
    const startX = (W - pxW)/2;
    const startY = (H - pxH)/2 - H*0.08;

    return points.map(p => ({
      x: startX + (p.gx - minX) * scale,
      y: startY + (p.gy - minY) * scale
    }));
  }

  let constellation = [];
  let links = [];

  function rebuildConstellation(){
    const scale = responsiveScale();
    const spacing = responsiveSpacing(scale);
    const lineGap = responsiveLineGap(scale);

    // Slightly tighter max width so it wraps nicely on phones (smaller text look)
    const maxWidth = Math.floor(W / (scale * 1.25));

    const anchors = toDotPoints(message, {
      scale,
      spacing,
      lineGap,
      maxWidth
    });

    constellation = [];

    const baseMaxOffset = Math.max(1.2, Math.min(2.2, W/700)); // gentler
    const hoverRadius = Math.max(120, Math.min(230, W/6.5));

    for(const p of anchors){
      const ax = p.x + rand(-1.0, 1.0);
      const ay = p.y + rand(-1.0, 1.0);

      // slightly fewer stars per dot => cleaner, smaller “text”
      const clusterCount = Math.floor(rand(3, 5));
      for(let k=0;k<clusterCount;k++){
        const spread = rand(0.0, 4.0);
        const ang = rand(0, Math.PI*2);

        const hx = ax + Math.cos(ang)*spread + rand(-0.35,0.35);
        const hy = ay + Math.sin(ang)*spread + rand(-0.35,0.35);

        const scatAng = rand(0, Math.PI*2);
        const scatX = Math.cos(scatAng);
        const scatY = Math.sin(scatAng);

        constellation.push({
          hx, hy,
          x: hx, y: hy,

          p1: rand(0, Math.PI*2),
          p2: rand(0, Math.PI*2),
          s1: rand(0.25, 0.75),
          s2: rand(0.18, 0.55),
          a1: rand(0.32, 0.85),
          a2: rand(0.22, 0.68),

          scatX, scatY,

          maxOffset: baseMaxOffset,
          hoverRadius,
          hover: 0,

          r: rand(0.65, 1.55) * (k===0 ? 1.08 : 1.0),
          a: rand(0.42, 0.92),
          tw: rand(0.75, 1.8),
          ph: rand(0, Math.PI*2),
        });
      }
    }

    // links (sparse + stable)
    const nodeEvery = Math.max(7, Math.floor(constellation.length / 220));
    const nodes = [];
    for(let i=0;i<constellation.length;i+=nodeEvery) nodes.push(i);

    links = [];
    const maxDist = Math.max(30, Math.min(54, W/24));

    for(const i of nodes){
      const p = constellation[i];
      const candidates = [];
      for(const j of nodes){
        if(i===j) continue;
        const q = constellation[j];
        const d = Math.hypot(q.hx - p.hx, q.hy - p.hy);
        if(d < maxDist) candidates.push({ j, d });
      }
      candidates.sort((a,b)=>a.d-b.d);
      const k = Math.min(2, candidates.length);
      for(let t=0;t<k;t++){
        const j = candidates[t].j;
        if(i < j) links.push([i, j, candidates[t].d, maxDist]);
      }
    }
  }

  rebuildConstellation();

  addEventListener("resize", () => {
    resize();
    buildBgStars();
    rebuildConstellation();
  });

  function drawBg(t){
    for(const s of bgStars){
      s.x += Math.cos(s.ph + t*s.drift) * 0.10;
      s.y += Math.sin(s.ph + t*s.drift) * 0.08;

      if(s.x < -5) s.x = W+5;
      if(s.x > W+5) s.x = -5;
      if(s.y < -5) s.y = H+5;
      if(s.y > H+5) s.y = -5;

      const tw = 0.65 + 0.35*Math.sin(t*s.tw + s.ph);
      const alpha = clamp(s.a * tw, 0, 1);

      ctx.beginPath();
      ctx.fillStyle = `rgba(255,255,255,${alpha})`;
      ctx.arc(s.x, s.y, s.r, 0, Math.PI*2);
      ctx.fill();
    }
  }

  function drawConstellation(t){
    const speed = Math.hypot(mouse.vx, mouse.vy);
    const motionBoost = clamp(speed / 20, 0, 1);

    for(const p of constellation){
      const dx = p.hx - mouse.x;
      const dy = p.hy - mouse.y;
      const dist = Math.hypot(dx, dy);

      p.hover = mouse.active ? (1 - smoothstep(0, p.hoverRadius, dist)) : 0;

      const driftX = Math.sin(t*p.s1 + p.p1) * p.a1 + Math.sin(t*p.s2 + p.p2) * p.a2;
      const driftY = Math.cos(t*(p.s1*0.92) + p.p1) * p.a1 + Math.cos(t*(p.s2*1.05) + p.p2) * p.a2;

      const scatterAmt = p.hover * (0.55 + 0.75*motionBoost);
      const scatterMax = 2.4 + 1.8*motionBoost;
      const scatterX = p.scatX * scatterMax * scatterAmt;
      const scatterY = p.scatY * scatterMax * scatterAmt;

      let tx = p.hx + driftX + scatterX;
      let ty = p.hy + driftY + scatterY;

      const ox = tx - p.hx;
      const oy = ty - p.hy;
      const od = Math.hypot(ox, oy);
      const limit = p.maxOffset + p.hover*1.4;
      if(od > limit){
        const m = limit / od;
        tx = p.hx + ox*m;
        ty = p.hy + oy*m;
      }

      const follow = 0.08 + 0.10*p.hover;
      p.x = lerp(p.x, tx, follow);
      p.y = lerp(p.y, ty, follow);
    }

    // lines
    ctx.lineWidth = 1;
    for(const [i,j,d,maxDist] of links){
      const a = constellation[i];
      const b = constellation[j];

      const fade = 1 - (d / maxDist);
      const hoverLine = clamp((a.hover + b.hover) * 0.55, 0, 1);
      const alpha = (0.09 * fade) + (0.09 * fade * hoverLine);

      ctx.strokeStyle = `rgba(165,210,255,${alpha})`;
      ctx.beginPath();
      ctx.moveTo(a.x, a.y);
      ctx.lineTo(b.x, b.y);
      ctx.stroke();
    }

    // stars
    for(const p of constellation){
      const tw = 0.82 + 0.18*Math.sin(t*p.tw + p.ph);
      const hoverTw = 1 + (0.10 * p.hover);
      const alpha = clamp(p.a * tw * hoverTw, 0, 1);

      const glow = p.r * (1.8 + 0.8*p.hover);
      const core = p.r * (0.95 + 0.18*p.hover);

      ctx.beginPath();
      ctx.fillStyle = `rgba(190,225,255,${alpha*(0.12 + 0.09*p.hover)})`;
      ctx.arc(p.x, p.y, glow, 0, Math.PI*2);
      ctx.fill();

      ctx.beginPath();
      ctx.fillStyle = `rgba(255,255,255,${alpha})`;
      ctx.arc(p.x, p.y, core, 0, Math.PI*2);
      ctx.fill();
    }
  }

  function frame(now){
    const t = now * 0.001;

    ctx.clearRect(0,0,W,H);
    ctx.fillStyle = "rgba(2,3,10,0.25)";
    ctx.fillRect(0,0,W,H);

    drawBg(t);
    drawConstellation(t);

    requestAnimationFrame(frame);
  }
  requestAnimationFrame(frame);
})();
</script>
</body>
</html>
