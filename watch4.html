<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Clock4</title>

  <style>
    body{
      margin:0;
      width:100vw;
      height:100vh;
      background-color:#fdfbd4;
      overflow:hidden;
    }

    img{
      position:absolute;
      user-select:none;
      pointer-events:auto;
      transition: width 2s ease, transform 150ms ease;
      will-change: left, top, width, transform;
      image-rendering: auto;
    }

    img:hover{
      z-index:10;
      transform: scale(1.12);
    }
  </style>
</head>

<body>
  <script>
    // IMPORTANT FOR GITHUB PAGES:
    // Put your images in the SAME folder as this HTML, OR set IMAGE_BASE to the folder they are in.
    // Examples:
    // const IMAGE_BASE = "./";          // same folder as this html
    // const IMAGE_BASE = "./images/";   // images folder next to this html
    const IMAGE_BASE = "./";

    const imageSources = [
      "watch1.png",
      "watch2.png",
      "watch3.png",
      "watch4.png",
      "watch5.png",
      "watch6.png",
      "watch7.png",
      "watch8.png",
      "watch9.png",
      "watch10.png",
    ];

    const images = [];
    const screenW = () => window.innerWidth;
    const screenH = () => window.innerHeight;

    function clampToScreen(obj){
      const w = obj.el.offsetWidth || 0;
      const h = obj.el.offsetHeight || w;
      obj.x = Math.max(0, Math.min(obj.x, screenW() - w));
      obj.y = Math.max(0, Math.min(obj.y, screenH() - h));
    }

    function makeImage(src){
      const img = document.createElement("img");

      // Use base path so GitHub Pages resolves consistently
      img.src = IMAGE_BASE + src;

      // If it fails, log a helpful message (most common: wrong folder or wrong capitalization)
      img.onerror = () => {
        console.warn("Image failed to load:", img.src, "Check path/folder + exact capitalization.");
        img.remove();
      };

      // SMALLER sizes
      const size = Math.random() * 90 + 55; // 55–145px
      img.style.width = size + "px";

      const obj = {
        el: img,
        x: Math.random() * Math.max(1, (screenW() - size)),
        y: Math.random() * Math.max(1, (screenH() - size)),
        vx: (Math.random() - 0.5) * 0.9,
        vy: (Math.random() - 0.5) * 0.9,
      };

      img.style.left = obj.x + "px";
      img.style.top  = obj.y + "px";

      images.push(obj);
      document.body.appendChild(img);
    }

    // Create images
    imageSources.forEach(makeImage);

    function animate(){
      images.forEach((obj) => {
        const size = obj.el.offsetWidth;

        obj.x += obj.vx;
        obj.y += obj.vy;

        if (obj.x <= 0){ obj.x = 0; obj.vx *= -1; }
        else if (obj.x + size >= screenW()){ obj.x = screenW() - size; obj.vx *= -1; }

        if (obj.y <= 0){ obj.y = 0; obj.vy *= -1; }
        else if (obj.y + size >= screenH()){ obj.y = screenH() - size; obj.vy *= -1; }
      });

      for (let i = 0; i < images.length; i++){
        for (let j = i + 1; j < images.length; j++){
          const a = images[i];
          const b = images[j];

          const sizeA = a.el.offsetWidth;
          const sizeB = b.el.offsetWidth;

          const ax = a.x + sizeA / 2;
          const ay = a.y + sizeA / 2;
          const bx = b.x + sizeB / 2;
          const by = b.y + sizeB / 2;

          const dx = ax - bx;
          const dy = ay - by;

          const dist = Math.sqrt(dx * dx + dy * dy) || 0.0001;
          const minDist = sizeA / 2 + sizeB / 2;

          if (dist < minDist){
            const overlap = minDist - dist;
            const nx = dx / dist;
            const ny = dy / dist;

            a.x += nx * (overlap / 2);
            a.y += ny * (overlap / 2);
            b.x -= nx * (overlap / 2);
            b.y -= ny * (overlap / 2);

            const tempVx = a.vx;
            const tempVy = a.vy;
            a.vx = b.vx;
            a.vy = b.vy;
            b.vx = tempVx;
            b.vy = tempVy;

            clampToScreen(a);
            clampToScreen(b);
          }
        }
      }

      images.forEach((obj) => {
        obj.el.style.left = obj.x + "px";
        obj.el.style.top  = obj.y + "px";
      });

      requestAnimationFrame(animate);
    }
    animate();

    // Random resize (SMALLER)
    setInterval(() => {
      images.forEach((obj) => {
        const newSize = Math.random() * 90 + 55; // 55–145px
        obj.el.style.width = newSize + "px";
        setTimeout(() => clampToScreen(obj), 0);
      });
    }, 3000);

    window.addEventListener("resize", () => {
      images.forEach((obj) => clampToScreen(obj));
    });
  </script>
</body>
</html>
