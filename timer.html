<!DOCTYPE html>
<html lang="en">
<head>
    <link rel="icon" type="image/png" href="hourglass.png">
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Real-Time Clock</title>

<style>
@font-face {
    font-family: "DrukCondSuper";
    src: url("Fonts/DrukCond-Super.otf") format("opentype");
    font-weight: normal;
    font-style: normal;
    font-display: swap;
}

body {
    margin:0;
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    font-family: "DrukCondSuper", Arial, sans-serif;
    transition: background 1s linear;
    color:white;
    padding: clamp(10px, 3vw, 28px);
    box-sizing: border-box;
}

.clock {
    font-size: clamp(70px, 14vw, 160px);
    color: #d6ecff;
    text-align:center;

    text-shadow:
        0 0 8px rgba(173, 216, 255, 0.8),
        0 0 18px rgba(173, 216, 255, 0.6),
        0 0 30px rgba(173, 216, 255, 0.4);

    max-width: 100%;
    white-space: nowrap;
}
</style>
</head>
<body>

<div class="clock" id="clock">00:00:00</div>

<script>
const clock = document.getElementById("clock");

function updateClock() {
    const now = new Date();
    const hours = now.getHours().toString().padStart(2,'0');
    const minutes = now.getMinutes().toString().padStart(2,'0');
    const seconds = now.getSeconds().toString().padStart(2,'0');

    clock.textContent = `${hours}:${minutes}:${seconds}`;

    const timeFraction = now.getHours()/24 + now.getMinutes()/(24*60) + now.getSeconds()/(24*3600);

    let lightness;
    if (timeFraction <= 0.5) {
        lightness = 0 + (80-0)*(timeFraction/0.5);
    } else {
        lightness = 80 - (80*(timeFraction-0.5)/0.5);
    }

    document.body.style.background = `hsl(210, 100%, ${lightness}%)`;
}

updateClock();
setInterval(updateClock, 1000);
</script>

</body>
</html>
