<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Real-Time Digital Clock</title>

<style>
/* --- FONT: match your folder name EXACTLY (Fonts) --- */
@font-face {
    font-family: "DrukCondSuper";
    src: url("Fonts/DrukCond-Super.otf") format("opentype");
    font-weight: normal;
    font-style: normal;
    font-display: swap;
}

body {
    margin:0;
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    font-family: "DrukCondSuper", Arial, sans-serif;
    transition: background 1s linear;
    color:white;

    /* small addition for better scaling on small screens */
    padding: clamp(10px, 3vw, 28px);
    box-sizing: border-box;
}

.clock {
    font-size: clamp(48px, 10vw, 100px);
    background: rgba(0,0,0,0.3);

    /* responsive padding keeps it looking right on phones */
    padding: clamp(14px, 2.5vw, 20px) clamp(22px, 4vw, 40px);

    border-radius: 20px;
    box-shadow: 0 0 20px rgba(0,0,0,0.5);
    text-align:center;

    /* prevents overflow on narrow screens */
    max-width: 100%;
    white-space: nowrap;
}
</style>
</head>
<body>

<div class="clock" id="clock">00:00:00</div>

<script>
const clock = document.getElementById("clock");

function updateClock() {
    const now = new Date();
    const hours = now.getHours().toString().padStart(2,'0');
    const minutes = now.getMinutes().toString().padStart(2,'0');
    const seconds = now.getSeconds().toString().padStart(2,'0');

    clock.textContent = `${hours}:${minutes}:${seconds}`;

    const timeFraction = now.getHours()/24 + now.getMinutes()/(24*60) + now.getSeconds()/(24*3600);

    let lightness;
    if (timeFraction <= 0.5) {
        lightness = 0 + (80-0)*(timeFraction/0.5);
    } else {
        lightness = 80 - (80*(timeFraction-0.5)/0.5);
    }

    document.body.style.background = `hsl(210, 100%, ${lightness}%)`;
}

updateClock();
setInterval(updateClock, 1000);
</script>

</body>
</html>
