<!DOCTYPE html> 
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Real-Time Digital Clock</title>

<style>
@font-face {
    font-family: 'DrukCondSuper';
    src: url('fonts/DrukCond-Super.otf') format('opentype');
    font-weight: normal;
    font-style: normal;
}

body {
    margin: 0;
    height: 100vh;
    display: flex;
    justify-content: center;
    align-items: center;
    transition: background 1s linear;
}

/* Clock never shifts: fixed width + tabular numerals */
.clock {
    font-family: 'DrukCondSuper', sans-serif;

    /* EVEN bigger */
    font-size: clamp(130px, 22vw, 320px);

    /* keep the whole string centered and stable */
    width: 8ch;                 /* "00:00:00" is 8 characters */
    text-align: center;
    line-height: 1;

    /* color + subtle shadow */
    color: #cfe9ff;
    text-shadow:
        0 6px 18px rgba(0, 0, 0, 0.45),
        0 0 10px rgba(180, 220, 255, 0.22);

    /* tighter spacing for digits + colons */
    letter-spacing: 0px;

    /* try to force equal-width numerals if supported */
    font-variant-numeric: tabular-nums;
    font-feature-settings: "tnum" 1, "kern" 1;
}
</style>
</head>

<body>
<div class="clock" id="clock">00:00:00</div>

<script>
const clock = document.getElementById("clock");

function updateClock() {
    const now = new Date();
    const hours = String(now.getHours()).padStart(2,'0');
    const minutes = String(now.getMinutes()).padStart(2,'0');
    const seconds = String(now.getSeconds()).padStart(2,'0');

    clock.textContent = `${hours}:${minutes}:${seconds}`;

    const timeFraction =
        now.getHours()/24 +
        now.getMinutes()/(24*60) +
        now.getSeconds()/(24*3600);

    let lightness;
    if (timeFraction <= 0.5) {
        lightness = 80 * (timeFraction / 0.5);
    } else {
        lightness = 80 - (80 * (timeFraction - 0.5) / 0.5);
    }

    document.body.style.background = `hsl(210, 100%, ${lightness}%)`;
}

updateClock();
setInterval(updateClock, 1000);
</script>
</body>
</html>
