<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Spinning Hourglass</title>

  <style>
    @font-face {
      font-family: "DrukText-Heavy";
      src: url("fonts/DrukText-Heavy.otf") format("opentype");
      font-weight: normal;
      font-style: normal;
      font-display: swap;
    }

    html, body {
      height: 100%;
      margin: 0;
    }

    body {
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      overflow: hidden;

      background: radial-gradient(
        circle at 50% 40%,
        #fff7cc 0%,
        #ffd580 35%,
        #ffb347 60%,
        #ff8c42 85%,
        #ff7a1a 100%
      );
    }

    body::before {
      content: "";
      position: fixed;
      inset: 0;
      background: rgba(255,255,255,0.06);
      pointer-events: none;
    }

    /* TEXT */
    .title {
      font-family: "DrukText-Heavy", sans-serif;
      color: #fffbe6;

      /* BIGGER + ALL CAPS */
      font-size: clamp(42px, 6vw, 100px);
      text-transform: uppercase;

      margin-bottom: clamp(24px, 5vh, 50px);
      text-align: center;
      letter-spacing: 2px;

      /* DROP SHADOW */
      text-shadow:
        0 6px 20px rgba(0,0,0,0.25),
        0 2px 6px rgba(0,0,0,0.2);
    }

    .wrap {
      width: min(70vmin, 560px);
      aspect-ratio: 1 / 1;
      display: grid;
      place-items: center;
    }

    a.hourglass-link {
      display: inline-block;
      width: 100%;
      height: 100%;
      cursor: pointer;
      text-decoration: none;
    }

    img#hourglass {
      width: 100%;
      height: 100%;
      object-fit: contain;

      animation: spin 6s linear infinite;
      transform-origin: center;

      filter: drop-shadow(0 18px 28px rgba(0,0,0,0.18));
      transition: transform 0.2s ease;
    }

    a.hourglass-link:hover img#hourglass {
      transform: scale(1.03);
    }

    @keyframes spin {
      from { transform: rotate(0deg); }
      to { transform: rotate(360deg); }
    }

    @media (max-width: 420px) {
      .wrap { width: min(82vmin, 520px); }
      .title { font-size: clamp(36px, 8vw, 70px); }
    }
  </style>
</head>

<body>
  <div class="title">PLEASE, TAKE A SHORT BREAK</div>

  <div class="wrap">
    <a href="https://www.youtube.com/watch?v=BbtMeLMQFs4" target="_blank">
      <img id="hourglass" src="hourglass.png" alt="Spinning hourglass" />
    </a>
  </div>
</body>
</html>
